model:
  name: mistral
  pretrained: mistralai/Mistral-7B-Instruct-v0.2
  torch_dtype: float16
  device_map: auto
  device: cuda
  load_in_4bit: true

generation:
  min_new_tokens: 5
  max_new_tokens: 256
  do_sample: true
  top_p: 0.95
  top_k: 50

data:
  input: datasets/human.json
  output: outputs/mistral_output.csv
