model:
  name: gemini
  pretrained: gemini-1.5-flash
  api_key: $GEMINI_API_KEY
  torch_dtype: float16
  device_map: auto

generation:
  max_new_tokens: 256
  do_sample: true
  top_p: 0.95
  top_k: 50
  temperature: 1.0

data:
  input: datasets/news_sample.json
  output: outputs/gemini_demo_news.json

postprocess:
  max_len_delta: 10
  min_len: 5